<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JAC Realty — CRM</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --negro:#000;--rojo:#E60909;--taupe:#999084;--blanco:#fff;
  --gris:#F5F5F5;--gris-m:#E8E8E8;--gris-t:#666;
  --sidebar:#111;--sidebar-w:240px;--header-h:60px;
  --sombra:0 2px 12px rgba(0,0,0,.08);--r:4px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Montserrat',sans-serif;background:var(--gris);color:var(--negro);min-height:100vh;font-size:14px}

/* LOGIN */
#login-screen{position:fixed;inset:0;background:var(--negro);display:flex;align-items:center;justify-content:center;z-index:9999}
.login-box{background:#fff;width:400px;padding:48px 40px;text-align:center}
.login-box img{width:180px;margin-bottom:8px}
.lline{width:100%;height:1px;background:var(--taupe);margin:16px 0 32px}
.login-box h2{font-size:12px;font-weight:500;letter-spacing:3px;color:var(--taupe);text-transform:uppercase;margin-bottom:28px}
.lf{text-align:left;margin-bottom:16px}
.lf label{display:block;font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--gris-t);margin-bottom:6px}
.lf input{width:100%;padding:11px 14px;border:1px solid var(--gris-m);font-family:'Montserrat',sans-serif;font-size:13px;outline:none;transition:.2s}
.lf input:focus{border-color:var(--negro)}
.btn-login{width:100%;padding:13px;background:var(--negro);color:#fff;border:none;font-family:'Montserrat',sans-serif;font-size:12px;font-weight:600;letter-spacing:2px;text-transform:uppercase;cursor:pointer;margin-top:8px;transition:.2s}
.btn-login:hover{background:var(--rojo)}
.lerr{color:var(--rojo);font-size:12px;margin-top:12px;display:none}
.pin-step{display:none}

/* APP */
#app{display:none;height:100vh;overflow:hidden}
.sidebar{position:fixed;left:0;top:0;width:var(--sidebar-w);height:100vh;background:var(--sidebar);display:flex;flex-direction:column;z-index:100}
.sb-logo{padding:24px 20px 16px;border-bottom:1px solid #222}
.sb-logo img{width:140px;filter:invert(1)}
.sb-lic{font-size:10px;color:var(--taupe);letter-spacing:1px;margin-top:6px}
.sb-nav{flex:1;padding:16px 0;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:12px;padding:11px 20px;color:#888;cursor:pointer;transition:.15s;font-size:13px;font-weight:500;letter-spacing:.3px;border-left:3px solid transparent}
.nav-item:hover{background:#1e1e1e;color:#fff}
.nav-item.active{background:#1e1e1e;color:#fff;border-left-color:var(--rojo)}
.nav-item .ic{font-size:15px;width:20px;text-align:center;flex-shrink:0}
.sb-bot{padding:16px 20px;border-top:1px solid #222}
.sb-user{font-size:11px;color:var(--taupe)}
.sb-user strong{display:block;color:#ccc;font-size:12px;margin-bottom:2px}
.btn-out{background:none;border:1px solid #333;color:#666;padding:6px 14px;font-family:'Montserrat',sans-serif;font-size:11px;cursor:pointer;margin-top:8px;transition:.15s;width:100%}
.btn-out:hover{border-color:var(--rojo);color:var(--rojo)}
.main{margin-left:var(--sidebar-w);height:100vh;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:var(--header-h);background:#fff;border-bottom:1px solid var(--gris-m);display:flex;align-items:center;padding:0 28px;gap:16px;flex-shrink:0}
.topbar h1{font-size:16px;font-weight:600;letter-spacing:.5px;flex:1}
.content{flex:1;overflow-y:auto;padding:28px}

/* BUTTONS */
.btn{padding:9px 18px;border:none;font-family:'Montserrat',sans-serif;font-size:12px;font-weight:600;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:.2s;border-radius:var(--r)}
.btn-p{background:var(--negro);color:#fff}.btn-p:hover{background:var(--rojo)}
.btn-s{background:#fff;color:var(--negro);border:1px solid var(--gris-m)}.btn-s:hover{border-color:var(--negro)}
.btn-d{background:var(--rojo);color:#fff}
.btn-sm{padding:6px 12px;font-size:11px}.btn-ic{padding:7px 10px}

/* KPI */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.kpi{background:#fff;padding:20px 22px;border-radius:var(--r);box-shadow:var(--sombra);border-top:3px solid var(--taupe)}
.kpi.rt{border-top-color:var(--rojo)}.kpi.bt{border-top-color:var(--negro)}
.kpi-lbl{font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--taupe);margin-bottom:8px}
.kpi-val{font-size:28px;font-weight:700;line-height:1}
.kpi-sub{font-size:11px;color:var(--gris-t);margin-top:4px}

/* TABLE */
.tc{background:#fff;border-radius:var(--r);box-shadow:var(--sombra);overflow:hidden}
.th{padding:16px 20px;border-bottom:1px solid var(--gris-m);display:flex;align-items:center;gap:12px}
.th h3{font-size:13px;font-weight:600;letter-spacing:.5px;flex:1}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{padding:10px 16px;font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--taupe);text-align:left;border-bottom:1px solid var(--gris-m);white-space:nowrap;background:var(--gris)}
td{padding:11px 16px;font-size:13px;border-bottom:1px solid var(--gris-m);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafafa}

/* BADGES */
.bdg{display:inline-block;padding:3px 9px;border-radius:2px;font-size:10px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;white-space:nowrap}
.bg{background:#e8f5e9;color:#2e7d32}.br{background:#ffebee;color:var(--rojo)}
.by{background:#fff9c4;color:#f57f17}.bb{background:#e3f2fd;color:#1565c0}
.bgr{background:var(--gris-m);color:var(--gris-t)}.bk{background:var(--negro);color:#fff}

/* TOGGLE */
.tw{position:relative;display:inline-block;width:42px;height:22px}
.tw input{opacity:0;width:0;height:0}
.tws{position:absolute;cursor:pointer;inset:0;background:#ccc;border-radius:22px;transition:.3s}
.tws:before{content:"";position:absolute;height:16px;width:16px;left:3px;bottom:3px;background:white;border-radius:50%;transition:.3s}
input:checked + .tws{background:var(--rojo)}
input:checked + .tws:before{transform:translateX(20px)}

/* MODAL */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:1000;display:none;align-items:center;justify-content:center}
.mo.open{display:flex}
.mbox{background:#fff;width:780px;max-width:95vw;max-height:92vh;display:flex;flex-direction:column}
.mhd{padding:20px 24px;border-bottom:1px solid var(--gris-m);display:flex;align-items:center}
.mhd h2{font-size:14px;font-weight:700;flex:1}
.mc{background:none;border:none;font-size:20px;cursor:pointer;color:var(--gris-t)}
.mc:hover{color:var(--rojo)}
.mb{flex:1;overflow-y:auto;padding:24px}
.mf{padding:16px 24px;border-top:1px solid var(--gris-m);display:flex;justify-content:flex-end;gap:10px}

/* FORM */
.fg{display:grid;grid-template-columns:1fr 1fr;gap:14px 20px}
.fg.c1{grid-template-columns:1fr}.fg.c3{grid-template-columns:1fr 1fr 1fr}
.fi{display:flex;flex-direction:column;gap:5px}
.fi.s2{grid-column:span 2}.fi.s3{grid-column:span 3}
.fi label{font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--taupe)}
.fi input,.fi select,.fi textarea{padding:9px 12px;border:1px solid var(--gris-m);font-family:'Montserrat',sans-serif;font-size:13px;outline:none;transition:.2s;border-radius:var(--r)}
.fi input:focus,.fi select:focus,.fi textarea:focus{border-color:var(--negro)}
.fi textarea{min-height:80px;resize:vertical}
.fsec{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--negro);margin:20px 0 12px;padding-bottom:6px;border-bottom:2px solid var(--negro);grid-column:1/-1}

/* SEARCH */
.si{padding:8px 14px;border:1px solid var(--gris-m);font-family:'Montserrat',sans-serif;font-size:13px;outline:none;border-radius:var(--r);width:240px}
.si:focus{border-color:var(--negro)}
.fs{padding:8px 12px;border:1px solid var(--gris-m);font-family:'Montserrat',sans-serif;font-size:12px;outline:none;border-radius:var(--r);background:#fff}

/* PIPELINE */
.pb{display:flex;gap:12px;overflow-x:auto;padding-bottom:16px;min-height:400px}
.pc{flex:0 0 195px;background:var(--gris);border-radius:var(--r);display:flex;flex-direction:column}
.pch{padding:12px 14px;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;border-bottom:2px solid var(--taupe)}
.pc0 .pch{border-color:var(--taupe)}.pc1 .pch{border-color:#2196f3}.pc2 .pch{border-color:#ff9800}
.pc3 .pch{border-color:#9c27b0}.pc4 .pch{border-color:#000}.pc5 .pch{border-color:#00bcd4}
.pc6 .pch{border-color:#4caf50}.pc7 .pch{border-color:var(--gris-m)}
.pcc{flex:1;padding:10px;display:flex;flex-direction:column;gap:8px;min-height:100px}
.dc{background:#fff;padding:12px;border-radius:var(--r);box-shadow:var(--sombra);cursor:pointer;border-left:3px solid var(--taupe);transition:.15s}
.dc:hover{transform:translateY(-1px)}
.dc h4{font-size:12px;font-weight:600;margin-bottom:4px;line-height:1.3}
.dc .dp{font-size:13px;font-weight:700}
.dc .dm{font-size:11px;color:var(--gris-t);margin-top:3px}
.pt{padding:8px 14px;font-size:11px;color:var(--gris-t);border-top:1px solid var(--gris-m)}

/* DETAIL */
.do{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:none}
.do.open{display:block}
.dp2{position:fixed;right:0;top:0;width:480px;height:100vh;background:#fff;z-index:501;overflow-y:auto;box-shadow:-4px 0 24px rgba(0,0,0,.15);transform:translateX(100%);transition:.3s}
.dp2.open{transform:translateX(0)}
.dh{padding:20px 24px;border-bottom:1px solid var(--gris-m);display:flex;align-items:center;gap:12px;position:sticky;top:0;background:#fff;z-index:10}
.dh h2{flex:1;font-size:15px;font-weight:700}
.db{padding:24px}
.ds{margin-bottom:24px}
.ds h4{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--taupe);margin-bottom:12px;padding-bottom:6px;border-bottom:1px solid var(--gris-m)}
.dr{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--gris);font-size:13px}
.dr span:first-child{color:var(--gris-t)}.dr span:last-child{font-weight:500}

/* DASH */
.dg{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.lc{background:#fff;border-radius:var(--r);box-shadow:var(--sombra);padding:20px}
.lc h3{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:16px}
.li{display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid var(--gris);font-size:13px}
.li:last-child{border-bottom:none}
.lic{width:32px;height:32px;border-radius:50%;background:var(--gris);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.lib{flex:1;min-width:0}
.lib-t{font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lib-s{font-size:11px;color:var(--gris-t)}

/* CHAR */
.cg{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.ci{display:flex;align-items:center;gap:8px;font-size:12px;cursor:pointer}
.ci input{cursor:pointer;accent-color:var(--rojo)}

/* MISC */
.loading{display:flex;align-items:center;justify-content:center;padding:48px;color:var(--gris-t);gap:12px;font-size:13px}
.spin{width:20px;height:20px;border:2px solid var(--gris-m);border-top-color:var(--rojo);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.es{text-align:center;padding:64px 24px;color:var(--gris-t)}
.es .ei{font-size:40px;margin-bottom:16px;opacity:.4}
.es h3{font-size:14px;font-weight:600;color:var(--negro);margin-bottom:8px}
.es p{font-size:13px;margin-bottom:20px}
.tco{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.tst{padding:12px 18px;border-radius:var(--r);font-size:13px;font-weight:500;box-shadow:0 4px 16px rgba(0,0,0,.2);animation:si .3s ease;display:flex;align-items:center;gap:10px;min-width:250px}
.tst.success{background:var(--negro);color:#fff}.tst.error{background:var(--rojo);color:#fff}
@keyframes si{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
.pt2{width:48px;height:36px;object-fit:cover;border-radius:2px}
@media(max-width:768px){
  .sidebar{transform:translateX(-100%);transition:.3s}.sidebar.open{transform:translateX(0)}
  .main{margin-left:0}.kpi-grid{grid-template-columns:repeat(2,1fr)}
  .fg{grid-template-columns:1fr}.fi.s2,.fi.s3{grid-column:span 1}.dg{grid-template-columns:1fr}
}
</style>
</head>

let AP=[];
async function pgProps(){
  const c=document.getElementById('pg-content'),ta=document.getElementById('pg-actions');
  ta.innerHTML='<button class="btn btn-p" onclick="nProp()">+ Nueva Propiedad</button>';
  ld(c);
  const {data,error}=await sb.from('propiedades_realty').select('*').order('created_at',{ascending:false});
  if(error){c.innerHTML='<p style="padding:24px;color:var(--rojo)">'+error.message+'</p>';return;}
  AP=data||[];
  renderPT(AP,c);

function renderPT(props,c){
  if(!props.length){es(c,'🏢','Sin propiedades','Agrega tu primera propiedad.','<button class="btn btn-p" onclick="nProp()">+ Agregar</button>');return;}
  c.innerHTML=`<div class="tc">
    <div class="th"><h3>Propiedades (${props.length})</h3>
      <input class="si" placeholder="🔍 Buscar..." oninput="fProps(this.value)">
      <select class="fs" onchange="fPropsOp(this.value)" id="fop"><option value="">Operación</option><option>Venta</option><option>Alquiler</option><option>Permuta</option></select>
      <select class="fs" onchange="fPropsEst(this.value)" id="fest"><option value="">Estado</option><option>Disponible</option><option>Reservado</option><option>Vendido</option><option>Alquilado</option></select>
    </div>
    <div class="tbl-wrap"><table>
      <thead><tr><th>Código</th><th>Propiedad</th><th>Operación</th><th>Precio</th><th>Estado</th><th style="text-align:center">Web 🌐</th><th>Acciones</th></tr></thead>
      <tbody id="ptb">${props.map(p=>pRow(p)).join('')}</tbody>
    </table></div>
  </div>`;
}

function pRow(p){
  const img=(p.imagenes&&p.imagenes[0])?`<img class="pt2" src="${p.imagenes[0]}" onerror="this.style.display='none'">`:'<div style="width:48px;height:36px;background:var(--gris);border-radius:2px;display:flex;align-items:center;justify-content:center">🏠</div>';
  const estBdg={Disponible:'bg',Reservado:'by','En Proceso':'bb',Vendido:'bk',Alquilado:'bgr','Fuera de Mercado':'bgr'};
  return `<tr>
    <td><span style="font-size:11px;font-weight:700;color:var(--taupe)">${p.codigo||'—'}</span></td>
    <td><div style="display:flex;align-items:center;gap:10px">${img}<div><div style="font-weight:500">${p.titulo}</div><div style="font-size:11px;color:var(--taupe)">${p.tipo_inmueble||''}${p.distrito?' · '+p.distrito:''}</div></div></div></td>
    <td><span class="bdg bgr">${p.tipo_operacion||'—'}</span></td>
    <td style="font-weight:700">${f$(p.precio)}</td>
    <td><span class="bdg ${estBdg[p.estado]||'bgr'}">${p.estado}</span></td>
    <td style="text-align:center"><label class="tw"><input type="checkbox" ${p.publicar_web?'checked':''} onchange="tgWeb('${p.id}',this.checked)"><span class="tws"></span></label></td>
    <td>
      <button class="btn btn-s btn-sm btn-ic" onclick="vProp('${p.id}')" title="Ver">👁</button>
      <button class="btn btn-s btn-sm btn-ic" onclick="eProp('${p.id}')" style="margin:0 4px" title="Editar">✏️</button>
      <button class="btn btn-s btn-sm btn-ic" onclick="dProp('${p.id}')" title="Eliminar">🗑</button>
    </td>
  </tr>`;
}

let _fq='',_fo='',_fe='';
function fProps(q){_fq=q;applyF();}
function fPropsOp(v){_fo=v;applyF();}
function fPropsEst(v){_fe=v;applyF();}
function applyF(){
  const f=AP.filter(p=>(!_fq||(p.titulo+p.codigo+p.direccion+p.distrito+'').toLowerCase().includes(_fq.toLowerCase()))&&(!_fo||p.tipo_operacion===_fo)&&(!_fe||p.estado===_fe));
  const tb=document.getElementById('ptb');if(tb)tb.innerHTML=f.map(p=>pRow(p)).join('');
}

async function tgWeb(id,val){
  const {error}=await sb.from('propiedades_realty').update({publicar_web:val}).eq('id',id);
  if(error){toast('Error: '+error.message,'error');return;}
  toast(val?'✓ Publicada en el website':'Quitada del website');
  const p=AP.find(x=>x.id===id);if(p)p.publicar_web=val;
}

async function eCli(id){const cl=AC.find(x=>x.id===id);if(!cl)return;om('Editar Cliente',cForm(cl),'<button class="btn btn-s" onclick="cm()">Cancelar</button><button class="btn btn-p" onclick="upCli(''+id+'')">Guardar</button>');}
async function upCli(id){const d=gCD();if(!d.nombre){toast('Nombre requerido','error');return;}const {error}=await sb.from('clientes_realty').update(d).eq('id',id);if(error){toast('Error: '+error.message,'error');return;}toast('Cliente actualizado ✓');cm();pgCli();}
async function dCli(id){if(!confirm('¿Eliminar?'))return;await sb.from('clientes_realty').delete().eq('id',id);toast('Cliente eliminado');pgCli();}

async function vCli(id){
  const cl=AC.find(x=>x.id===id);if(!cl)return;
  const {data:acts}=await sb.from('actividades_realty').select('*').eq('cliente_id',id).order('fecha',{ascending:false}).limit(5);
  const TIPO_IC={Llamada:'📞',Visita:'🏠',Email:'✉',WhatsApp:'💬','Reunión':'🤝',Nota:'📝'};
  od(`<div class="dh"><h2>${cl.nombre} ${cl.apellido||''}</h2><button class="mc" onclick="cd()">✕</button></div>
  <div class="db">
    <div style="display:flex;gap:8px;margin-bottom:20px"><span class="bdg bb">${cl.tipo}</span><span class="bdg ${cl.estado==='Activo'?'bg':'bgr'}">${cl.estado}</span></div>
    <div class="ds"><h4>Contacto</h4>
      <div class="dr"><span>Teléfono</span><span>${cl.telefono||'—'}</span></div>
      <div class="dr"><span>WhatsApp</span><span>${cl.whatsapp||'—'}</span></div>
      <div class="dr"><span>Email</span><span>${cl.email||'—'}</span></div>
      <div class="dr"><span>Origen</span><span>${cl.origen||'—'}</span></div>
    </div>
    <div class="ds"><h4>Interés</h4>
      <div class="dr"><span>Operación</span><span>${cl.operacion_busca||'—'}</span></div>
      <div class="dr"><span>Tipo</span><span>${cl.tipo_inmueble_busca||'—'}</span></div>
      <div class="dr"><span>Presupuesto</span><span>${cl.presupuesto_max?f$(cl.presupuesto_min||0)+' – '+f$(cl.presupuesto_max):'—'}</span></div>
    </div>
    ${cl.notas?`<div class="ds"><h4>Notas</h4><p style="font-size:13px">${cl.notas}</p></div>`:''}
    <div class="ds"><h4>Actividades</h4>
      ${(acts||[]).length?(acts||[]).map(a=>`<div class="li"><div class="lic">${TIPO_IC[a.tipo]||'📌'}</div><div class="lib"><div class="lib-t">${a.descripcion||a.tipo}</div><div class="lib-s">${fdt(a.fecha)}</div></div></div>`).join(''):'<p style="font-size:12px;color:var(--gris-t)">Sin actividades</p>'}
      <button class="btn btn-s btn-sm" style="margin-top:12px" onclick="nAct(null,'${id}')">+ Registrar Actividad</button>
    </div>
    <div class="ds"><h4>Propiedades Compatibles</h4>
      <button class="btn btn-s btn-sm" onclick="bComp('${id}')">🔍 Buscar Compatibles</button>
      <div id="cr" style="margin-top:12px"></div>
    </div>
  </div>`);
}

async function bComp(cid){
  const cl=AC.find(x=>x.id===cid);if(!cl)return;
  let q=sb.from('propiedades_realty').select('codigo,titulo,precio,tipo_operacion,tipo_inmueble,habitaciones').eq('estado','Disponible');
  if(cl.operacion_busca)q=q.eq('tipo_operacion',cl.operacion_busca);
  if(cl.tipo_inmueble_busca)q=q.eq('tipo_inmueble',cl.tipo_inmueble_busca);
  if(cl.presupuesto_max)q=q.lte('precio',cl.presupuesto_max);
  if(cl.presupuesto_min)q=q.gte('precio',cl.presupuesto_min);
  const {data}=await q.limit(5);
  const el=document.getElementById('cr');if(!el)return;
  if(!data?.length){el.innerHTML='<p style="font-size:12px;color:var(--gris-t)">Sin propiedades compatibles.</p>';return;}
  el.innerHTML=data.map(p=>`<div style="padding:8px;border:1px solid var(--gris-m);border-radius:4px;margin-bottom:6px;font-size:12px"><strong>${p.codigo} — ${p.titulo}</strong><br><span style="color:var(--taupe)">${p.tipo_operacion} · ${p.tipo_inmueble} · ${f$(p.precio)}</span></div>`).join('');
}

// ═══ PIPELINE ═══
const ETAPAS=['Contacto Inicial','Visita Agendada','Visita Realizada','Oferta Presentada','Negociando','Promesa Firmada','Cerrado','Perdido'];
async function pgPipe(){
  const c=document.getElementById('pg-content'),ta=document.getElementById('pg-actions');
  ta.innerHTML='<button class="btn btn-p" onclick="nNeg()">+ Nueva Negociación</button>';
  ld(c);
  const [nr,pr,cr]=await Promise.all([
    sb.from('negociaciones_realty').select('*').order('created_at',{ascending:false}),
    sb.from('propiedades_realty').select('id,codigo,titulo'),
    sb.from('clientes_realty').select('id,nombre,apellido')
  ]);
  const negs=nr.data||[],props=pr.data||[],clis=cr.data||[];
  const pipeVal=negs.filter(n=>!['Cerrado','Perdido'].includes(n.etapa)).reduce((s,n)=>s+(n.precio_oferta||0),0);
  c.innerHTML=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
    <div style="font-size:13px;color:var(--gris-t)">Pipeline: <strong style="font-size:16px;color:var(--negro)">${f$(pipeVal)}</strong></div>
    <span style="font-size:12px;color:var(--taupe)">${negs.filter(n=>!['Cerrado','Perdido'].includes(n.etapa)).length} abiertas</span>
  </div>
  <div class="pb">${ETAPAS.map((et,i)=>{
    const col=negs.filter(n=>n.etapa===et);
    const tot=col.reduce((s,n)=>s+(n.precio_oferta||0),0);
    return `<div class="pc pc${i}"><div class="pch">${et} <span style="font-weight:400;color:var(--taupe)">(${col.length})</span></div>
      <div class="pcc">${col.map(n=>{
        const pp=props.find(x=>x.id===n.propiedad_id),cc=clis.find(x=>x.id===n.cliente_id);
        return `<div class="dc"><h4>${n.titulo||pp?.titulo||'Sin título'}</h4>${n.precio_oferta?'<div class="dp">'+f$(n.precio_oferta)+'</div>':''}${cc?'<div class="dm">👤 '+cc.nombre+' '+(cc.apellido||'')+'</div>':''}${pp?'<div class="dm">🏢 '+pp.codigo+'</div>':''}<div class="dm" style="margin-top:4px"><span class="bdg ${n.tipo==='Venta'?'bk':n.tipo==='Alquiler'?'bg':'bgr'}">${n.tipo||'—'}</span></div></div>`;
      }).join('')}</div>
      ${tot?'<div class="pt">'+f$(tot)+'</div>':''}</div>`;
  }).join('')}</div>`;
}

async function nNeg(){
  const [pr,cr]=await Promise.all([sb.from('propiedades_realty').select('id,codigo,titulo'),sb.from('clientes_realty').select('id,nombre,apellido')]);
  om('Nueva Negociación',`<div class="fg">
    <div class="fi s2"><label>Título</label><input id="n-tt" placeholder="Ej: Venta Apto Costa del Este"></div>
    <div class="fi"><label>Tipo</label><select id="n-tp"><option>Venta</option><option>Alquiler</option><option>Permuta</option></select></div>
    <div class="fi"><label>Etapa</label><select id="n-et">${ETAPAS.map(e=>'<option>'+e+'</option>').join('')}</select></div>
    <div class="fi"><label>Propiedad</label><select id="n-pr"><option value="">— Sin propiedad —</option>${(pr.data||[]).map(p=>'<option value="'+p.id+'">'+p.codigo+' — '+p.titulo+'</option>').join('')}</select></div>
    <div class="fi"><label>Cliente</label><select id="n-cl"><option value="">— Sin cliente —</option>${(cr.data||[]).map(c=>'<option value="'+c.id+'">'+c.nombre+' '+(c.apellido||'')+'</option>').join('')}</select></div>
    <div class="fi"><label>Precio Oferta (USD)</label><input type="number" id="n-pr2"></div>
    <div class="fi"><label>Fecha Esperada Cierre</label><input type="date" id="n-fe"></div>
    <div class="fi s2"><label>Notas</label><textarea id="n-nt" rows="3"></textarea></div>
  </div>`,'<button class="btn btn-s" onclick="cm()">Cancelar</button><button class="btn btn-p" onclick="svNeg()">Guardar</button>');
}

async function svNeg(){
  const d={titulo:document.getElementById('n-tt').value.trim(),tipo:document.getElementById('n-tp').value,etapa:document.getElementById('n-et').value,propiedad_id:document.getElementById('n-pr').value||null,cliente_id:document.getElementById('n-cl').value||null,precio_oferta:Number(document.getElementById('n-pr2').value)||null,fecha_esperada:document.getElementById('n-fe').value||null,notas:document.getElementById('n-nt').value.trim()};
  const {error}=await sb.from('negociaciones_realty').insert(d);
  if(error){toast('Error: '+error.message,'error');return;}
  toast('Negociación creada ✓');cm();pgPipe();
}

// ═══ ACTIVIDADES ═══
async function pgActs(){
  const c=document.getElementById('pg-content'),ta=document.getElementById('pg-actions');
  ta.innerHTML='<button class="btn btn-p" onclick="nAct(null,null)">+ Registrar Actividad</button>';
  ld(c);
  const {data}=await sb.from('actividades_realty').select('*').order('fecha',{ascending:false}).limit(50);
  const acts=data||[];
  c.innerHTML=`<div class="tc"><div class="th"><h3>Actividades (${acts.length})</h3></div>
  <div class="tbl-wrap"><table>
    <thead><tr><th>Tipo</th><th>Descripción</th><th>Fecha</th></tr></thead>
    <tbody>${acts.length?acts.map(a=>`<tr><td><span class="bdg bgr">${a.tipo}</span></td><td>${a.descripcion||'—'}</td><td style="font-size:12px;color:var(--gris-t)">${fdt(a.fecha)}</td></tr>`).join(''):'<tr><td colspan="3" style="text-align:center;padding:32px;color:var(--gris-t)">Sin actividades</td></tr>'}</tbody>
  </table></div></div>`;
}

function nAct(pid,cid){
  om('Registrar Actividad',`<div class="fg c1">
    <div class="fi"><label>Tipo *</label><select id="a-tp"><option>Llamada</option><option>Visita</option><option>Email</option><option>WhatsApp</option><option>Reunión</option><option>Nota</option></select></div>
    <div class="fi"><label>Descripción</label><textarea id="a-ds" rows="4" placeholder="Detalle..."></textarea></div>
  </div>`,'<button class="btn btn-s" onclick="cm()">Cancelar</button><button class="btn btn-p" onclick="svAct(''+pid+'',''+cid+'')">Guardar</button>');
}

async function svAct(pid,cid){
  const d={tipo:document.getElementById('a-tp').value,descripcion:document.getElementById('a-ds').value.trim(),propiedad_id:(pid&&pid!=='null')?pid:null,cliente_id:(cid&&cid!=='null')?cid:null,fecha:new Date().toISOString()};
  const {error}=await sb.from('actividades_realty').insert(d);
  if(error){toast('Error: '+error.message,'error');return;}
  toast('Actividad registrada ✓');cm();
  if(cid&&cid!=='null')vCli(cid);
}

// ═══ REPORTES ═══
async function pgRep(){
  const c=document.getElementById('pg-content');ld(c);
  const [p,cl,neg]=await Promise.all([sb.from('propiedades_realty').select('estado,tipo_operacion,tipo_inmueble'),sb.from('clientes_realty').select('tipo,estado,origen'),sb.from('negociaciones_realty').select('etapa,precio_oferta,precio_cierre')]);
  const props=p.data||[],clis=cl.data||[],negs=neg.data||[];
  const byEst=props.reduce((a,x)=>{a[x.estado]=(a[x.estado]||0)+1;return a;},{});
  const byOp=props.reduce((a,x)=>{a[x.tipo_operacion||'Sin especificar']=(a[x.tipo_operacion||'Sin especificar']||0)+1;return a;},{});
  const byCT=clis.reduce((a,x)=>{a[x.tipo||'Sin tipo']=(a[x.tipo||'Sin tipo']||0)+1;return a;},{});
  const pipeV=negs.filter(n=>!['Cerrado','Perdido'].includes(n.etapa)).reduce((s,n)=>s+(n.precio_oferta||0),0);
  const cerV=negs.filter(n=>n.etapa==='Cerrado').reduce((s,n)=>s+(n.precio_cierre||n.precio_oferta||0),0);
  c.innerHTML=`<div class="kpi-grid" style="grid-template-columns:repeat(3,1fr)">
    <div class="kpi bt"><div class="kpi-lbl">Total Propiedades</div><div class="kpi-val">${props.length}</div></div>
    <div class="kpi rt"><div class="kpi-lbl">Pipeline Abierto</div><div class="kpi-val" style="font-size:20px">${f$(pipeV)}</div></div>
    <div class="kpi"><div class="kpi-lbl">Volumen Cerrado</div><div class="kpi-val" style="font-size:20px">${f$(cerV)}</div></div>
  </div>
  <div class="dg">
    <div class="lc"><h3>Por Estado</h3>${Object.entries(byEst).map(([k,v])=>`<div class="li"><div class="lib"><div class="lib-t">${k}</div></div><strong>${v}</strong></div>`).join('')}</div>
    <div class="lc"><h3>Por Operación</h3>${Object.entries(byOp).map(([k,v])=>`<div class="li"><div class="lib"><div class="lib-t">${k}</div></div><strong>${v}</strong></div>`).join('')}</div>
    <div class="lc"><h3>Clientes por Tipo</h3>${Object.entries(byCT).map(([k,v])=>`<div class="li"><div class="lib"><div class="lib-t">${k}</div></div><strong>${v}</strong></div>`).join('')}</div>
    <div class="lc"><h3>Pipeline por Etapa</h3>${ETAPAS.map(e=>{const n=negs.filter(x=>x.etapa===e).length;return n?`<div class="li"><div class="lib"><div class="lib-t">${e}</div></div><strong>${n}</strong></div>`:''}).join('')}</div>
  </div>`;
}

// ═══ NOTAS ═══
async function pgNotas(){
  const c=document.getElementById('pg-content'),ta=document.getElementById('pg-actions');
  ta.innerHTML='<button class="btn btn-p" onclick="nNota()">+ Nueva Nota</button>';
  ld(c);
  const {data}=await sb.from('notas_realty').select('*').order('created_at',{ascending:false});
  const notas=data||[];
  if(!notas.length){es(c,'📝','Sin notas','Crea tu primera nota.','<button class="btn btn-p" onclick="nNota()">+ Nueva Nota</button>');return;}
  c.innerHTML=`<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px">
    ${notas.map(n=>`<div class="tc" style="padding:20px;cursor:pointer" onclick="eNota('${n.id}')">
      <div style="font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--taupe);margin-bottom:8px">${fdt(n.created_at)}</div>
      <h4 style="font-size:14px;font-weight:600;margin-bottom:8px">${n.titulo||'Sin título'}</h4>
      <p style="font-size:12px;color:var(--gris-t);line-height:1.5">${(n.contenido||'').substring(0,120)}${(n.contenido||'').length>120?'…':''}</p>
    </div>`).join('')}
  </div>`;
}

function nNota(){om('Nueva Nota','<div class="fg c1"><div class="fi"><label>Título</label><input id="no-tt" placeholder="Título de la nota"></div><div class="fi"><label>Contenido</label><textarea id="no-ct" rows="8" placeholder="Escribe aquí..."></textarea></div></div>','<button class="btn btn-s" onclick="cm()">Cancelar</button><button class="btn btn-p" onclick="svNota()">Guardar Nota</button>');}

async function svNota(){
  const d={titulo:document.getElementById('no-tt').value.trim(),contenido:document.getElementById('no-ct').value.trim()};
  const {error}=await sb.from('notas_realty').insert(d);
  if(error){toast('Error: '+error.message,'error');return;}
  toast('Nota guardada ✓');cm();pgNotas();
}

async function eNota(id){
  const {data}=await sb.from('notas_realty').select('*').eq('id',id).single();if(!data)return;
  om('Editar Nota','<div class="fg c1"><div class="fi"><label>Título</label><input id="no-tt" value="'+data.titulo+'"></div><div class="fi"><label>Contenido</label><textarea id="no-ct" rows="8">'+data.contenido+'</textarea></div></div>',
  '<button class="btn btn-d btn-sm" onclick="dNota(''+id+'')">Eliminar</button><button class="btn btn-s" onclick="cm()">Cancelar</button><button class="btn btn-p" onclick="upNota(''+id+'')">Guardar</button>');
}

async function upNota(id){
  const d={titulo:document.getElementById('no-tt').value.trim(),contenido:document.getElementById('no-ct').value.trim()};
  const {error}=await sb.from('notas_realty').update(d).eq('id',id);
  if(error){toast('Error','error');return;}toast('Nota actualizada ✓');cm();pgNotas();
}

async function dNota(id){if(!confirm('¿Eliminar?'))return;await sb.from('notas_realty').delete().eq('id',id);toast('Nota eliminada');cm();pgNotas();}
</script>
